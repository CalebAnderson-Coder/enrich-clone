services:
  - type: web
    name: agency-fleet-runtime
    env: node
    region: ohio
    buildCommand: npm install --include=dev && npm run heroku-postbuild
    startCommand: npm start
    envVars:
      # ── Backend Runtime ──────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: BRIGHTDATA_API_TOKEN
        sync: false
      - key: APIFY_API_TOKEN
        sync: false

      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"

      - key: API_SECRET_KEY
        sync: false

      # Multi-tenant: UUID of the brand this worker serves (Phase B single-tenant).
      # Default = Empírika. When onboarding a 2nd tenant, deploy a separate service
      # with a different BRAND_ID value.
      - key: BRAND_ID
        value: "eca1d833-77e3-4690-8cf1-2a44db20dcf8"

      # FRONTEND_URL = Render public URL (set after first deploy)
      - key: FRONTEND_URL
        sync: false

      # ── Frontend Build Variables (VITE_ prefix) ──────────────────
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_SERVICE_KEY
        sync: false
      - key: VITE_API_SECRET_KEY
        sync: false
      # VITE_API_URL vacío => usa /api relativo en producción
      - key: VITE_API_URL
        value: ""

      # ── Sprint 1: Autonomía (DISABLED by default; flip to "true" in dashboard when ready) ──
      - key: AUTONOMY_ENABLED
        value: "false"
      - key: AUTO_APPROVE_TIMEOUT_MS
        value: "7200000"
      - key: MAX_SENDS_PER_HOUR
        value: "30"
      - key: MAX_LEADS_PER_DAY_PER_BRAND
        value: "50"
      - key: BOUNCE_RATE_CIRCUIT_BREAKER
        value: "0.05"

      # ── Sprint 4: Lead magnet bucket (Supabase Storage público) ──
      - key: SUPABASE_LEAD_MAGNET_BUCKET
        value: "lead-magnets"

      # ── Sprint 2: Learning loop (DISABLED until migration 014 applied) ──
      - key: LEARNING_ENABLED
        value: "false"
      - key: PIXEL_BASE_URL
        sync: false
      - key: GHL_WEBHOOK_SECRET
        sync: false

      # ── Sprint 3: Estratega (agente #10) — DISABLED por default ──
      - key: ESTRATEGA_ENABLED
        value: "false"
      - key: ESTRATEGA_DAILY_HOUR_UTC
        value: "23"
      - key: ESTRATEGA_WEEKLY_DAY
        value: "0"
      - key: ESTRATEGA_WEEKLY_HOUR_UTC
        value: "12"

      # ── Sprint 5: Multichannel (WhatsApp Baileys + SMS Twilio) ──
      - key: MULTICHANNEL_ENABLED
        value: "false"
      - key: WA_WARMUP_WEEK1_CAP
        value: "5"
      - key: WA_WARMUP_WEEK2_CAP
        value: "15"
      - key: WA_WARMUP_WEEK3_CAP
        value: "30"
      - key: WA_WARMUP_WEEK4PLUS_CAP
        value: "50"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

      # ── Sprint 5: Dashboard V2 (LeadDetailView /leads/:id) ──
      - key: DASHBOARD_V2_ENABLED
        value: "false"
      - key: VITE_DASHBOARD_V2_ENABLED
        value: "false"

  # ── Lyra: Autonomous B2B Content Engine ──────────────────────
  # Runs Mon-Fri at 12:00 UTC (8:00 AM ET)
  # Pipeline: BrightData Research → Gemini Draft → Buffer → LinkedIn
  - type: cron
    name: lyra-daily-engine
    env: node
    region: ohio
    schedule: "0 12 * * 1-5"
    buildCommand: cd lyra-engine && npm install
    startCommand: cd lyra-engine && node index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: BRIGHTDATA_API_TOKEN
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_PROFILE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
