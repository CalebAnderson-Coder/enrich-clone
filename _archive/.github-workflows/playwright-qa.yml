name: QA UI Agent - Playwright Tests

on:
  push:
    branches: [ "main", "master", "development" ]
  pull_request:
    branches: [ "main", "master", "development" ]

jobs:
  qa-test:
    name: Run UI Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    defaults:
      run:
        # Aquí definimos la carpeta donde vive el frontend
        working-directory: ./enrich-dashboard

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: ⚙️ Preparar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './enrich-dashboard/package-lock.json'

    - name: 📦 Instalar dependencias
      run: npm ci

    - name: 🎭 Instalar navegadores de Playwright
      run: npx playwright install --with-deps chromium

    - name: 🚀 Ejecutar test de QA Centinela
      run: npm run qa

    - name: 📊 Guardar reportes en caso de fallo
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: ./enrich-dashboard/playwright-report/
        retention-days: 10
